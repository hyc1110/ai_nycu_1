<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Anonymous Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@400;600;700&family=Inter:wght@400;500;600&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- ── Join Screen ── -->
  <div id="screen-join" class="screen is-active">
    <div class="join-card">
      <h1 class="join-title">Anonymous Chat</h1>
      <p class="join-subtitle">Enter a callsign to join the conversation</p>

      <div class="field-group">
        <input
          id="callsign-input"
          class="text-input"
          type="text"
          placeholder="Enter your callsign…"
          maxlength="20"
          aria-label="Callsign"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
        />
        <p class="field-hint">Letters, numbers, and underscores only. Max 20 characters.</p>
        <p id="join-error" class="field-error" aria-live="polite"></p>
      </div>

      <button id="join-btn" class="btn-primary" type="button">Join Chat</button>
    </div>
  </div>

  <!-- ── Chat Screen ── -->
  <div id="screen-chat" class="screen" hidden>
    <header class="top-bar">
      <span class="top-bar__title">Anonymous Chat</span>
      <div class="top-bar__status" aria-live="polite" aria-atomic="true">
        <span class="status-dot" id="status-dot" data-status="connected"></span>
        <span class="status-label" id="status-label">Connected</span>
      </div>
      <span class="top-bar__callsign" id="my-callsign"></span>
    </header>

    <div class="chat-body">
      <div
        class="message-list"
        id="message-list"
        role="log"
        aria-label="Chat messages"
        aria-live="polite"
      ></div>

      <div class="input-bar">
        <input
          id="msg-input"
          class="text-input msg-input"
          type="text"
          placeholder="Type a message…"
          maxlength="1000"
          aria-label="Message"
          autocomplete="off"
        />
        <button id="send-btn" class="send-btn" type="button" aria-label="Send message">
          <span class="send-btn__text">Send</span>
          <span class="send-btn__icon" aria-hidden="true">&#8593;</span>
        </button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
